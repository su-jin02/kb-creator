<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB크리에이터 - 차세대 MZ사원</title>
  <style>
    @font-face {
      font-family: 'KBfgText';
      src: url('file/KBfgTextL.ttf') format('truetype');
      font-weight: 300;
    }
    @font-face {
      font-family: 'KBfgText';
      src: url('file/KBfgTextM.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'KBfgText';
      src: url('file/KBfgTextM.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'KBfgText';
      src: url('file/KBfgTextB.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'KBfgText';
      src: url('file/KBfgTextB.ttf') format('truetype');
      font-weight: 800;
    }
    @font-face {
      font-family: 'KBfgText';
      src: url('file/KBfgTextB.ttf') format('truetype');
      font-weight: 900;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --kb-yellow: #F5C400;
      --kb-yellow-dark: #D4A800;
      --kb-yellow-light: #FFF3B0;
      --kb-black: #1A1A1A;
      --kb-gray: #555;
      --kb-light: #FFFDF0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'KBfgText', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--kb-light);
      color: var(--kb-black);
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #FFE033 0%, #F5C400 50%, #E6AE00 100%);
      overflow: hidden;
      text-align: center;
      padding: 40px 20px;
    }

    .hero::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      top: -150px; right: -150px;
    }
    .hero::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      bottom: -100px; left: -100px;
    }

    .kb-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.12);
      color: #1A1A1A;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 8px 20px;
      border-radius: 50px;
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    .kb-logo {
      font-size: 22px;
      font-weight: 900;
      background: white;
      color: var(--kb-yellow);
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 900;
      color: #1A1A1A;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 16px;
      position: relative; z-index: 1;
    }

    .hero h1 span {
      display: block;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 20px);
      color: rgba(0,0,0,0.6);
      font-weight: 500;
      margin-bottom: 48px;
      position: relative; z-index: 1;
    }

    .hero-team {
      font-size: clamp(13px, 2vw, 17px);
      font-weight: 800;
      color: rgba(0,0,0,0.55);
      letter-spacing: 1px;
      margin-bottom: 40px;
      position: relative; z-index: 1;
    }

    .scroll-hint {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(0,0,0,0.45);
      font-size: 13px;
      animation: bounce 2s infinite;
    }

    .scroll-hint::after {
      content: '↓';
      font-size: 20px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    /* ── MEMBERS SECTION ── */
    .members-section {
      padding: 80px 20px 100px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-title h2 {
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 900;
      color: var(--kb-black);
      margin-bottom: 12px;
    }

    .section-title h2 em {
      font-style: normal;
      color: var(--kb-yellow-dark);
      border-bottom: 4px solid var(--kb-yellow);
    }

    .section-title p {
      color: var(--kb-gray);
      font-size: 16px;
    }

    /* ── MEMBER CARDS ── */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      justify-items: center;
    }

    @media (min-width: 768px) {
      .members-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .member-card {
      background: white;
      border-radius: 24px;
      padding: 36px 24px 30px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 2px solid transparent;
      width: 100%;
      max-width: 260px;
      position: relative;
      overflow: hidden;
    }

    .member-card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--kb-yellow), var(--kb-yellow-dark));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .member-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 48px rgba(245, 196, 0, 0.25);
      border-color: var(--kb-yellow);
    }

    .member-card:hover::before { transform: scaleX(1); }

    .member-card:active { transform: translateY(-4px) scale(0.98); }

    .member-photo {
      width: 124px; height: 124px;
      border-radius: 50%;
      margin: 0 auto 20px;
      overflow: hidden;
      border: 3px solid var(--kb-yellow-light);
      background: var(--kb-yellow-light);
      position: relative;
    }

    .member-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* placeholder avatar */
    .avatar-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: linear-gradient(135deg, #FFE55C, #F5C400);
    }

    .play-icon {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .play-icon svg { width: 32px; height: 32px; fill: white; }

    .member-card:hover .play-icon { opacity: 1; }

    .member-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--kb-black);
      margin-bottom: 8px;
    }

    .member-intro {
      font-size: 15px;
      color: var(--kb-gray);
      line-height: 1.55;
    }

    .member-tag {
      display: inline-block;
      margin-top: 14px;
      background: var(--kb-yellow-light);
      color: var(--kb-yellow-dark);
      font-size: 13px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: white;
      border-radius: 28px;
      width: 100%;
      max-width: 680px;
      overflow: hidden;
      transform: scale(0.92) translateY(20px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      background: linear-gradient(135deg, #FFE033, #F5C400);
      padding: 28px 28px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .modal-photo {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid white;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--kb-yellow-light);
    }

    .modal-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .modal-photo .avatar-placeholder { font-size: 28px; }

    .modal-info h3 {
      font-size: 22px;
      font-weight: 900;
      color: var(--kb-black);
    }

    .modal-info p {
      font-size: 14px;
      color: rgba(0,0,0,0.6);
      margin-top: 4px;
    }

    .modal-close {
      margin-left: auto;
      background: rgba(0,0,0,0.12);
      border: none;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover { background: rgba(0,0,0,0.25); }

    .modal-body { padding: 28px; }

    .video-wrapper {
      position: relative;
      padding-bottom: 177.78%;
      height: 0;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      object-fit: cover;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a, #333);
      color: white;
      gap: 12px;
      font-size: 15px;
    }

    .video-placeholder svg {
      width: 56px; height: 56px;
      fill: var(--kb-yellow);
    }

    .modal-desc {
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--kb-gray);
    }

    .modal-desc strong { color: var(--kb-black); }

    .insta-scroll {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .insta-card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      overflow: hidden;
      background: white;
      transition: border-color 0.2s;
    }

    .insta-card:hover { border-color: #C13584; }

    .insta-card-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
      background: #f0f0f0;
    }

    .insta-card-img-placeholder {
      width: 100%;
      aspect-ratio: 1/1;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .insta-card-footer {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #C13584;
    }

    .insta-scroll-hint {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
    }

    /* ── PM 경고창 ── */
    .pm-alert {
      border: 3px solid var(--kb-black);
      border-radius: 16px;
      overflow: hidden;
      font-family: 'KBfgText', sans-serif;
    }

    .pm-alert-bar {
      background: var(--kb-black);
      color: var(--kb-yellow);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }

    .pm-alert-bar .dots {
      display: flex; gap: 5px; margin-left: auto;
    }

    .pm-alert-bar .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }

    .pm-alert-body {
      background: #FFFDF0;
      padding: 28px 24px;
      text-align: center;
    }

    .pm-alert-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: shake 1.5s infinite;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-8deg); }
      40% { transform: rotate(8deg); }
      60% { transform: rotate(-4deg); }
      80% { transform: rotate(4deg); }
    }

    .pm-alert-title {
      font-size: 17px;
      font-weight: 900;
      color: var(--kb-black);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .pm-alert-title em {
      font-style: normal;
      color: var(--kb-yellow-dark);
      border-bottom: 2px solid var(--kb-yellow);
    }

    .pm-alert-desc {
      font-size: 14px;
      color: var(--kb-gray);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .pm-alert-btn {
      display: inline-block;
      background: var(--kb-yellow);
      color: var(--kb-black);
      font-size: 15px;
      font-weight: 800;
      padding: 12px 36px;
      border-radius: 8px;
      border: 2px solid var(--kb-black);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 3px 3px 0 var(--kb-black);
    }

    .pm-alert-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--kb-black);
    }

    .pm-alert-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--kb-black);
    }

    .pm-alert-footer {
      background: #f0f0f0;
      border-top: 2px solid var(--kb-black);
      padding: 10px 16px;
      font-size: 11px;
      color: #888;
      text-align: left;
    }

    .blog-preview-card {
      display: block;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid var(--kb-yellow);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      background: white;
    }

    .blog-preview-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(245,196,0,0.25);
    }

    .blog-preview-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: var(--kb-yellow-light);
    }

    .blog-preview-img-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #FFE55C, #F5C400);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .blog-preview-info {
      padding: 16px 18px;
      border-top: 2px solid var(--kb-yellow-light);
    }

    .blog-preview-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--kb-black);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .blog-preview-desc {
      font-size: 13px;
      color: var(--kb-gray);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .blog-preview-domain {
      margin-top: 8px;
      font-size: 12px;
      color: var(--kb-yellow-dark);
      font-weight: 700;
    }

    .blog-link-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(135deg, #FFFBE6, #FFF3B0);
      border: 2px solid var(--kb-yellow);
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
    }

    .blog-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--kb-yellow);
      color: var(--kb-black);
      font-size: 15px;
      font-weight: 800;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .blog-btn:hover {
      background: var(--kb-yellow-dark);
      transform: translateY(-2px);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--kb-black);
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 28px 20px;
      font-size: 13px;
    }

    footer span { color: var(--kb-yellow); }
  </style>
</head>

      blogUrl: "https://m.blog.naver.com/hera4224/223011056461",
      blogPreviewImg: "file/sujin_blog.jpeg",
      blogDesc: "✈️ 어학연수 브이로그는 내가 제일 잘 씀",
      desc: "🇪🇬 이집트 놀러가서 낋여온 유행 쇼츠 🎬"
    }
  ];

  // ── 카드 렌더링 ──
  const grid = document.getElementById('membersGrid');

  members.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML = `
      <div class="member-photo">
        ${m.photo
          ? `<img src="${m.photo}" alt="${m.name}" />`
          : `<div class="avatar-placeholder">${m.emoji}</div>`}
        <div class="play-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="member-name">${m.name}</div>
      <div class="member-intro">${m.intro}</div>
      <span class="member-tag">${m.tag}</span>
    `;
    card.addEventListener('click', () => openModal(i));
    grid.appendChild(card);
  });

  // ── 블로그 미리보기 ──
  async function renderInstaGrid(containerId, urls) {
    const el = document.getElementById(containerId);
    if (!el) return;

    // 초기 플레이스홀더 렌더
    el.innerHTML = `
      <div class="insta-scroll">
        ${urls.map((url, i) => `
          <a class="insta-card" id="${containerId}-${i}" href="${url}" target="_blank" rel="noopener noreferrer">
            <div class="insta-card-img-placeholder">📸</div>
            <div class="insta-card-footer">불러오는 중...</div>
          </a>`).join('')}
      </div>
`;

    // 각 카드 미리보기 fetch
    urls.forEach(async (url, i) => {
      const card = document.getElementById(`${containerId}-${i}`);
      if (!card) return;
      try {
        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        if (data.status === 'success') {
          const { image } = data.data;
          const imgHtml = image?.url
            ? `<img class="insta-card-img" src="${image.url}" alt="Instagram Reel" />`
            : `<div class="insta-card-img-placeholder">🎬</div>`;
          card.innerHTML = `${imgHtml}<div class="insta-card-footer">▶ Reels ${i + 1} 보기</div>`;
        }
      } catch { /* 플레이스홀더 유지 */ }
    });
  }

  async function renderBlogPreview(containerId, url, localImg, emoji) {
    const el = document.getElementById(containerId);
    if (!el) return;

    // 이모지만 쓰는 경우 API 호출 없이 바로 표시
    if (!localImg && emoji) {
      el.innerHTML = `
        <a class="blog-preview-card" href="${url}" target="_blank" rel="noopener noreferrer">
          <div class="blog-preview-img-placeholder">${emoji}</div>
          <div class="blog-preview-info">
            <div class="blog-preview-title">블로그 바로가기</div>
            <div class="blog-preview-domain">📝 ${new URL(url).hostname}</div>
          </div>
        </a>`;
      return;
    }

    // 로컬 이미지가 있으면 API 호출 없이 바로 표시
    if (localImg) {
      el.innerHTML = `
        <a class="blog-preview-card" href="${url}" target="_blank" rel="noopener noreferrer">
          <img class="blog-preview-img" src="${localImg}" alt="블로그 미리보기" />
          <div class="blog-preview-info">
            <div class="blog-preview-title">블로그 바로가기</div>
            <div class="blog-preview-domain">📝 ${new URL(url).hostname}</div>
          </div>
        </a>`;
      return;
    }

    el.innerHTML = `<div class="blog-link-box"><span style="color:#aaa;font-size:14px;">미리보기 불러오는 중...</span></div>`;
    try {
      const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      if (data.status === 'success') {
        const { title, description, image, url: link } = data.data;
        const imgHtml = image?.url
          ? `<img class="blog-preview-img" src="${image.url}" alt="블로그 미리보기" />`
          : `<div class="blog-preview-img-placeholder">✍️</div>`;
        el.innerHTML = `
          <a class="blog-preview-card" href="${link || url}" target="_blank" rel="noopener noreferrer">
            ${imgHtml}
            <div class="blog-preview-info">
              <div class="blog-preview-title">${title || '블로그 보기'}</div>
              ${description ? `<div class="blog-preview-desc">${description}</div>` : ''}
              <div class="blog-preview-domain">📝 ${new URL(url).hostname}</div>
            </div>
          </a>`;
      } else {
        throw new Error('fetch failed');
      }
    } catch {
      el.innerHTML = `
        <a class="blog-preview-card" href="${url}" target="_blank" rel="noopener noreferrer">
          <div class="blog-preview-img-placeholder">${emoji || '✍️'}</div>
          <div class="blog-preview-info">
            <div class="blog-preview-title">블로그 바로가기</div>
            <div class="blog-preview-domain">📝 ${new URL(url).hostname}</div>
          </div>
        </a>`;
    }
  }

  // ── 모달 ──
  const overlay = document.getElementById('modalOverlay');
  const modalPhoto = document.getElementById('modalPhoto');
  const modalName = document.getElementById('modalName');
  const modalIntro = document.getElementById('modalIntro');
  const videoWrapper = document.getElementById('videoWrapper');
  const modalDesc = document.getElementById('modalDesc');

  function openModal(i) {
    const m = members[i];
    modalPhoto.innerHTML = m.photo
      ? `<img src="${m.photo}" alt="${m.name}" />`
      : `<div class="avatar-placeholder">${m.emoji}</div>`;
    modalName.textContent = m.name;
    modalIntro.textContent = m.intro;
    // PM 경고창 스타일
    if (m.alertStyle) {
      modalDesc.innerHTML = '';
      videoWrapper.style.paddingBottom = '0';
      videoWrapper.style.height = 'auto';
      videoWrapper.innerHTML = `
        <div class="pm-alert">
          <div class="pm-alert-bar">
            ⚠️ &nbsp;SYSTEM ALERT
            <div class="dots">
              <div class="dot" style="background:#ff5f57;"></div>
              <div class="dot" style="background:#febc2e;"></div>
              <div class="dot" style="background:#28c840;"></div>
            </div>
          </div>
          <div class="pm-alert-body">
            <div class="pm-alert-icon">🚨</div>
            <div class="pm-alert-title">
              이런 <em>능력자들을 통솔</em>하는<br>PM이 궁금하다면?
            </div>
            <div class="pm-alert-desc">
              촬영, 편집, 기획, 인터뷰까지—<br>
              이 모든 걸 하나로 묶는 사람이 있습니다.<br><br>
              함께한다면, 더 많은 매력을<br>
              직접 보여드리겠습니다 🧭
            </div>
            <button class="pm-alert-btn" id="pmAlertOk">확인했습니다 ✓</button>
          </div>
          <div class="pm-alert-footer">
            ※ 본 알림은 장현지 총괄PM이 직접 승인한 메시지입니다.
          </div>
        </div>`;
      document.getElementById('pmAlertOk').addEventListener('click', closeModal);
      document.getElementById('modalBlogArea').innerHTML = '';
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      return;
    }

    // 여러 영상이 있는 경우 (세로 스크롤)
    if (m.videoUrls && m.videoUrls.length) {
      modalDesc.innerHTML = m.desc ? `<strong style="font-size:17px;">${m.desc}</strong>` : '';
      videoWrapper.style.paddingBottom = '0';
      videoWrapper.style.height = 'auto';
      videoWrapper.innerHTML = m.videoUrls.map((url, idx) => `
        <div style="position:relative;padding-bottom:177.78%;height:0;border-radius:16px;overflow:hidden;background:#111;${idx > 0 ? 'margin-top:16px;' : ''}">
          <video src="${url}" controls style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;"></video>
        </div>`).join('');
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      // 블로그도 있으면 아래에 추가
      const blogArea2 = document.getElementById('modalBlogArea');
      blogArea2.innerHTML = '';
      if (m.blogUrl) {
        const blogLabel = m.blogDesc ? `<p style="font-size:17px;font-weight:700;color:var(--kb-black);margin:20px 0 10px;">${m.blogDesc}</p>` : '';
        blogArea2.innerHTML = `${blogLabel}<div id="blog-preview-multi"></div>`;
        renderBlogPreview('blog-preview-multi', m.blogUrl, m.blogPreviewImg, m.blogEmoji);
      }
      return;
    }

    // 인스타그램 릴스가 있는 경우
    if (m.instaUrls && m.instaUrls.length) {
      modalDesc.innerHTML = m.desc ? `<strong style="font-size:17px;">${m.desc}</strong>` : '';
      videoWrapper.style.paddingBottom = '0';
      videoWrapper.style.height = 'auto';
      videoWrapper.innerHTML = `<div class="insta-grid" id="insta-grid-${i}"></div>`;
      renderInstaGrid(`insta-grid-${i}`, m.instaUrls);
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      return;
    }

    // 영상 없이 블로그만 있는 경우
    if (m.blogUrl !== undefined && !m.videoUrl) {
      modalDesc.innerHTML = `<strong>${m.name}</strong>의 블로그 콘텐츠<br><br>${m.desc}`;
      videoWrapper.style.paddingBottom = '0';
      videoWrapper.style.height = 'auto';
      videoWrapper.innerHTML = `<div id="blog-preview-solo"></div>`;
      if (m.blogUrl) {
        renderBlogPreview('blog-preview-solo', m.blogUrl, m.blogPreviewImg, m.blogEmoji);
      } else {
        document.getElementById('blog-preview-solo').innerHTML =
          `<div class="blog-link-box"><span style="color:#aaa;font-size:14px;">블로그 URL을 등록해주세요</span></div>`;
      }
    } else {
      // 영상이 있는 경우
      modalDesc.innerHTML = m.desc ? `<strong style="font-size:17px;">${m.desc}</strong>` : '';
      videoWrapper.style.paddingBottom = '56.25%';
      videoWrapper.style.height = '0';
      if (m.videoUrl) {
        const isYoutube = m.videoUrl.includes('youtube') || m.videoUrl.includes('youtu.be');
        const isMp4 = m.videoUrl.endsWith('.mp4');
        if (isYoutube) {
          videoWrapper.innerHTML = `<iframe src="${m.videoUrl}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        } else if (isMp4) {
          videoWrapper.innerHTML = `<video src="${m.videoUrl}" controls></video>`;
        } else {
          videoWrapper.innerHTML = `<iframe src="${m.videoUrl}" allowfullscreen></iframe>`;
        }
      } else {
        videoWrapper.innerHTML = `
          <div class="video-placeholder">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span>영상 URL을 등록해주세요</span>
          </div>`;
      }
      // 영상 아래 추가 이미지
      const blogArea = document.getElementById('modalBlogArea');
      blogArea.innerHTML = '';
      if (m.extraImg) {
        blogArea.innerHTML += `
          <p style="font-size:17px;font-weight:700;color:var(--kb-black);margin:20px 0 10px;">${m.extraImgDesc || ''}</p>
          <img src="${m.extraImg}" alt="추가 이미지" style="width:100%;border-radius:16px;display:block;" />`;
      }
      if (m.blogUrl !== undefined && m.blogUrl) {
        const blogLabel = m.blogDesc ? `<p style="font-size:17px;font-weight:700;color:var(--kb-black);margin:20px 0 10px;">${m.blogDesc}</p>` : '';
        blogArea.innerHTML = `${blogLabel}<div id="blog-preview-below"></div>`;
        renderBlogPreview('blog-preview-below', m.blogUrl, m.blogPreviewImg, m.blogEmoji);
      }
    }

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    setTimeout(() => {
      videoWrapper.innerHTML = '';
      document.getElementById('modalBlogArea').innerHTML = '';
    }, 300);
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
